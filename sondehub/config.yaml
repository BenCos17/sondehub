# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: SondeHub
version: "1.0.9"
slug: sondehub
description: >-
  Stream live radiosonde (weather balloon) telemetry from SondeHub to
  Home Assistant via MQTT. Creates sensors and a device tracker for each
  detected radiosonde.
url: "https://pypi.org/project/sondehub/"
arch:
  - aarch64
  - amd64
image: "ghcr.io/bencos17/{arch}-addon-sondehub"
init: false
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  min_publish_interval: 10
  area_alert_enabled: false
  area_lat_min: -90
  area_lat_max: 90
  area_lon_min: -180
  area_lon_max: 180
  amateur: false
  filter_serials: []
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  min_publish_interval: int(0,3600)
  area_alert_enabled: bool
  area_lat_min: float
  area_lat_max: float
  area_lon_min: float
  area_lon_max: float
  amateur: bool
  filter_serials:
    - str
