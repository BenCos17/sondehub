# SondeHub Dashboard Example (v1.1.0+)
# 
# RECOMMENDED: Install lovelace-auto-entities from HACS for dynamic radiosonde cards
# https://github.com/thomasloven/lovelace-auto-entities
#
# To use:
# 1. Install lovelace-auto-entities (HACS → Frontend → Search "auto-entities")
# 2. In Home Assistant, go to Dashboard → Create Dashboard
# 3. Switch to YAML mode and paste the content below
# 4. Save - dashboard auto-populates as new radiosondes are detected!

views:
  - path: sondehub
    title: SondeHub Live Telemetry
    cards:
      # MAIN STATUS - Shows immediately
      - type: heading
        heading: SondeHub Status

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.active_radiosondes
            name: Active Radiosondes
            needle: true
            min: 0
            max: 30
            unit: sondes

          - type: entities
            title: Latest Sonde
            entities:
              - sensor.latest_radiosonde

      # ALERT AREA (if configured)
      - type: heading
        heading: Alert Area

      - type: horizontal-stack
        cards:
          - type: entities
            title: Status
            entities:
              - binary_sensor.any_radiosonde_in_alert_area

          - type: entities
            title: Last in Area
            entities:
              - sensor.last_radiosonde_in_alert_area

      # ==========================================
      # DYNAMIC RADIOSONDE CARDS (requires auto-entities)
      # ==========================================

      - type: heading
        heading: Active Radiosondes (Auto-Refreshing)

      # ALT 1: Individual sonde cards with gauges
      - type: custom:auto-entities
        filter:
          include:
            - domain: sensor
              entity_id: "/.*radiosonde.+_altitude$/"
        card:
          type: gauge
          min: 0
          max: 35000
          unit: m
        sort:
          method: friendly_name
        columns: 3

      - type: custom:auto-entities
        filter:
          include:
            - domain: sensor
              entity_id: "/.*radiosonde.+_temperature$/"
        card:
          type: gauge
          min: -80
          max: 30
          unit: "°C"
        sort:
          method: friendly_name
        columns: 3

      - type: custom:auto-entities
        filter:
          include:
            - domain: sensor
              entity_id: "/.*radiosonde.+_humidity$/"
        card:
          type: gauge
          min: 0
          max: 100
          unit: "%"
        sort:
          method: friendly_name
        columns: 3

      - type: custom:auto-entities
        filter:
          include:
            - domain: sensor
              entity_id: "/.*radiosonde.+_battery$/"
        card:
          type: gauge
          min: 0
          max: 100
          unit: "%"
        sort:
          method: friendly_name
        columns: 4

      # ALT 2: Detailed sonde status + location
      - type: heading
        heading: Sonde Status & Location

      - type: custom:auto-entities
        filter:
          include:
            - domain: sensor
              entity_id: "/.*radiosonde.+_status$/"
        card:
          type: entities
        sort:
          method: friendly_name

      - type: custom:auto-entities
        filter:
          include:
            - domain: device_tracker
              entity_id: "/.*radiosonde.+_location$/"
        card:
          type: map
        sort:
          method: friendly_name

      # ALT 3: Advanced telemetry (if announce_all_entities: true)
      - type: heading
        heading: Advanced Telemetry

      - type: custom:auto-entities
        filter:
          include:
            - domain: sensor
              entity_id: "/.*radiosonde.+(speed_horizontal|speed_vertical|heading|rssi)$/"
        card:
          type: entities
        sort:
          method: friendly_name

      # ==========================================
      # FALLBACK (no auto-entities needed)
      # ==========================================

      - type: heading
        heading: All Active Sondes (JSON)

      - type: entities
        title: Live Radiosonde Data
        entities:
          - sensor.active_radiosondes
        state_color: true
