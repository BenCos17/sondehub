configuration:
  mqtt_host:
    name: MQTT Host
    description: >-
      Hostname or IP address of your MQTT broker.
      Use "core-mosquitto" if you have the Mosquitto MQTT add-on installed.
  mqtt_port:
    name: MQTT Port
    description: Port of the MQTT broker. Default is 1883.
  mqtt_user:
    name: MQTT Username
    description: Username for MQTT authentication. Leave blank if not required.
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT authentication. Leave blank if not required.
  min_publish_interval:
    name: Minimum Publish Interval (seconds)
    description: >-
      Minimum time between MQTT state publishes per radiosonde.
      Increase this to reduce MQTT traffic.
  area_alert_enabled:
    name: Enable Area Alerts
    description: >-
      Enable geofence alerts when a radiosonde enters the configured
      latitude/longitude bounding box.
  area_lat_min:
    name: Area Latitude Min
    description: Minimum latitude of alert area (south edge).
  area_lat_max:
    name: Area Latitude Max
    description: Maximum latitude of alert area (north edge).
  area_lon_min:
    name: Area Longitude Min
    description: Minimum longitude of alert area (west edge).
  area_lon_max:
    name: Area Longitude Max
    description: Maximum longitude of alert area (east edge).
  amateur:
    name: Amateur Launches
    description: >-
      Subscribe to amateur high-altitude balloon launches in addition to
      the standard meteorological radiosonde feed.
  filter_serials:
    name: Filter by Serial Numbers
    description: >-
      Optional list of specific radiosonde serial numbers to track
      (e.g. R3320848). Leave empty to receive all radiosondes worldwide.
